<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>HSB</title>
    <!-- BEGIN: Base Styles -->
    <style data-purpose="base-layout">
        :root {
            --bg-grad-1: #b8e0fc;
            --bg-grad-2: #bacff7;
            --card-bg: #ffffff;
            --border: #e7e7e7;
            --footer-bg: #fbfbfb;
            --text: #0f172a;
            --muted: #64748b;
            --subtle: #fafafa;
            --primary: #122634;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-grad-1: #122634;
                --bg-grad-2: #070C15;
                --card-bg: #13222E;
                --border: #0a1721;
                --footer-bg: #0c161e;
                --text: #ffffff;
                --muted: #cbd5e1;
                --subtle: #203c52;
                --primary: #203c52;
                --row-nth-child-odd-bg: #203c52;
                --row-nth-child-even-bg: #13222E;
            }

        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            color: var(--text);
            background: linear-gradient(180deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%) fixed;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Main Container for the Welcome Card */
        .app-container {
            width: 440px;
            max-width: 90vw;
            background-color: #1c2a35; /* Dark slate background */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }
    </style>
    <!-- END: Base Styles -->
    <!-- BEGIN: Header Styles -->
    <style data-purpose="header-styles">
        .header {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1c2a35;
        }

        /* Diamond Logo Frame */
        .logo-diamond {
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transform: rotate(45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Content inside the diamond (un-rotated) */
        .logo-text {
            transform: rotate(-45deg);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffffff;
        }
    </style>
    <!-- END: Header Styles -->
    <!-- BEGIN: Navigation Styles -->
    <style data-purpose="navigation-styles">
        .nav-list {
            display: flex;
            flex-direction: column;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 24px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.9);
            background-color: #1c2a35;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background-color 0.2s ease, color 0.2s ease;
            font-size: 15px;
            font-weight: 400;
        }

        /* Remove border from last item */
        .nav-item:last-child {
            border-bottom: none;
        }

        .nav-item:hover {
            background-color: #243441;
            color: #ffffff;
        }

        /* Flag/Emoji styling */
        .flag-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
        }

        .flag-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
    <!-- END: Navigation Styles -->
    <!-- BEGIN: Footer Styles -->
    <style data-purpose="footer-styles">
        .footer {
            padding: 25px 20px;
            background-color: #16212a; /* Slightly darker than container */
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            line-height: 1.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer .version {
            display: block;
            margin-bottom: 4px;
        }
    </style>
    <!-- END: Footer Styles -->
</head>
